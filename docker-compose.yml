version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: bigdata_lab1_postgres
    restart: always
    environment:
      POSTGRES_DB: bigdata_lab
      POSTGRES_USER: 
      POSTGRES_PASSWORD: pass
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: